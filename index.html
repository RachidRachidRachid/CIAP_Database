<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIAP - Holcim Professional Audit Tool</title>
    <style>
        :root[data-theme="light"] {
            --bg-primary: #f5f7fa; --bg-card: #ffffff; --text-main: #1e293b; --accent: #ff4f00; --border-color: #e2e8f0; --success: #10b981;
        }
        :root[data-theme="dark"] {
            --bg-primary: #0b0f19; --bg-card: #141c2f; --text-main: #f8fafc; --accent: #ff5e13; --border-color: #22314d; --success: #10b981;
        }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-primary); color: var(--text-main); transition: background 0.3s; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: var(--bg-card); border-bottom: 2px solid var(--accent); }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: var(--bg-card); border-radius: 12px; padding: 2rem; border: 1px solid var(--border-color); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.2rem; display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; letter-spacing: 0.5px; }
        select, input { padding: 0.75rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-primary); color: inherit; font-size: 1rem; transition: 0.2s; }
        select:focus, input:focus { border-color: var(--accent); outline: none; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 0.85rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px; width: 100%; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card h3 { font-size: 0.8rem; opacity: 0.7; margin: 0; text-transform: uppercase; }
        .stat-card p { font-size: 1.8rem; font-weight: bold; margin: 0.5rem 0 0 0; color: var(--accent); }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-top: 1.5rem; }
        .option-btn { background: var(--bg-primary); border: 1px solid var(--border-color); padding: 1.2rem; border-radius: 8px; text-align: left; color: inherit; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .option-btn:hover, .option-btn.selected { border-color: var(--accent); background: rgba(255, 79, 0, 0.08); }
        .progress-bar { background: var(--border-color); height: 8px; border-radius: 4px; overflow: hidden; margin: 1.5rem 0; }
        #progressFill { background: var(--accent); height: 100%; width: 0%; transition: width 0.3s; }
        .hidden { display: none !important; }
        .badge { padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .badge-warn { background: #eab308; color: #000; }
        .badge-danger { background: #ef4444; color: #fff; }
        .badge-success { background: var(--success); color: #fff; }
        .exam-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <header class="navbar">
        <div style="font-weight: bold; font-size: 1.3rem; letter-spacing: 1px;">🏭 HOLCIM <span style="color: var(--accent);">CIAP PRO</span></div>
        <div id="userProfile" style="font-weight: 500;">Non connecté</div>
        <button id="themeToggle" class="btn-secondary">🌓 Mode</button>
    </header>

    <main class="container">
        
        <section id="loginScreen" class="card">
            <h2 style="margin-top:0;">Identification Audité</h2>
            <p style="opacity:0.7; margin-top:-10px; font-size:0.9rem;">Système d'évaluation de l'inspection technique.</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" id="lastName" required placeholder="Ex: BENALI" style="text-transform: uppercase;">
                </div>
                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" id="firstName" required placeholder="Ex: Mohamed">
                </div>
                <button type="submit" class="btn-primary">Entrer dans l'espace d'évaluation</button>
            </form>
        </section>

        <section id="dashboardScreen" class="hidden">
            <div class="dashboard-grid">
                <div class="card stat-card"><h3>Banque de Questions</h3><p>60 Questions Disponibles</p></div>
                <div class="card stat-card"><h3>Réseau Holcim</h3><p style="color:var(--success); font-size:1.3rem;">Protégé / Prêt</p></div>
            </div>

            <div class="card">
                <h3 style="margin-top:0;">🛠️ Configuration du Test</h3>
                <div class="setup-grid">
                    <div class="form-group">
                        <label>Domaine d'Audit</label>
                        <select id="cfgDomaine">
                            <option value="Tous">Tous les domaines (Mixte)</option>
                            <option value="Maintenance mécanique">Maintenance mécanique</option>
                            <option value="Inspection & Surveillance">Inspection & Surveillance</option>
                            <option value="Fiabilité & Méthodes">Fiabilité & Méthodes</option>
                            <option value="HSE & Risques d'usine">HSE & Risques d'usine</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Volume de questions</label>
                        <select id="cfgNb">
                            <option value="5" selected>5 Questions</option>
                            <option value="10">10 Questions</option>
                            <option value="20">20 Questions</option>
                        </select>
                    </div>
                </div>
                <button id="btnStartExam" class="btn-primary">Démarrer le Test</button>
            </div>
        </section>

        <section id="examScreen" class="card hidden">
            <div class="exam-header">
                <div><span class="badge badge-warn" id="lblDomaine">--</span></div>
                <div><span id="questionTimer" class="badge badge-danger">--s</span></div>
            </div>
            <div class="progress-bar"><div id="progressFill"></div></div>
            <div id="questionBox">
                <h3 id="questionText" style="line-height:1.4; font-size:1.3rem;">--</h3>
                <div id="optionsContainer" class="options-grid"></div>
            </div>
            <button id="btnNext" class="btn-primary" style="margin-top:2rem;">Suivant</button>
        </section>

        <form id="googleSyncForm" method="POST" action="https://script.google.com/a/macros/holcim.com/s/AKfycbwr2KQ2m8-Yc0Z1iTv-s3PX6GQTLFhA3B77VqRu9jFDsQY86seFxZUpi0EEQaSZuRQK/exec" class="hidden">
            <input type="hidden" name="user" id="postUser">
            <input type="hidden" name="domaine" id="postDomaine">
            <input type="hidden" name="nbQuestions" id="postNb">
            <input type="hidden" name="score" id="postScore">
            <input type="hidden" name="statut" id="postStatut">
            <input type="hidden" name="temps" id="postTemps">
        </form>
    </main>

    <script>
        // Banque embarquée sécurisée de secours s'il y a blocage d'importation
        const questionBank = [
            { domaine:"Maintenance mécanique", question:"Quelle est la cause principale de défaillance prématurée d'un roulement de ventilateur de tirage de four ?", options:["Défaut de lubrification ou pollution","Vitesse excessive","Changement de teinte de l'acier"], correct:0, temps:20 },
            { domaine:"Maintenance mécanique", question:"Lors de l'alignement laser d'un groupe moto-réducteur de broyeur, que compense-t-on en priorité ?", options:["La croissance thermique machine en marche","Le jeu d'engrènement","Le couple de démarrage"], correct:0, temps:25 },
            { domaine:"Maintenance mécanique", question:"Quel composant empêche le retournement d'un convoyeur à bande incliné en charge lors d'un arrêt d'urgence ?", options:["Le système anti-retour (Backstop)","Le tambour de décharge","Le racleur interne"], correct:0, temps:20 },
            { domaine:"Maintenance mécanique", question:"Sur un broyeur à boulets, l'usure ondulée des plaques de blindage du premier compartiment sert à :", options:["Relever les boulets pour optimiser l'impact par chute","Freiner la matière","Éviter la chauffe du ciment"], correct:0, temps:20 },
            { domaine:"Maintenance mécanique", question:"Quel phénomène indique un déplacement axial incorrect (migration) de la virole du four sur ses bandages ?", options:["Une usure excessive des galets buteurs","Une baisse de température de la zone de transition","Un blocage du moteur auxiliaire"], correct:0, temps:30 },
            { domaine:"Inspection & Surveillance", question:"Une huile de réducteur de vis d'alimentation noircie avec une odeur de brûlé traduit :", options:["Une dégradation par oxydation thermique","Une présence d'eau mineure","Un rodage normal après 100 heures"], correct:0, temps:20 },
            { domaine:"Inspection & Surveillance", question:"En analyse vibratoire, l'apparition de bandes latérales autour de la fréquence d'engrènement d'un réducteur indique :", options:["Un défaut ou une fissure sur une dent de pignon","Un balourd du moteur électrique","Un manque de graisse dans le palier lourd"], correct:0, temps:30 },
            { domaine:"Inspection & Surveillance", question:"Sur un raccord électrique de cellule HT, un point chaud net détecté par caméra thermique signifie :", options:["Une résistance de contact élevée due à un serrage défectueux","Une sous-charge de la ligne","Une isolation parfaite du câble"], correct:0, temps:20 },
            { domaine:"Inspection & Surveillance", question:"La détection d'une fréquence de défaut de bague externe (BPFI) sur un palier de ventilateur nécessite :", options:["Une planification de remplacement du roulement à court/moyen terme","Un arrêt d'urgence immédiat dans la minute","Une simple vidange d'huile"], correct:0, temps:25 },
            { domaine:"Inspection & Surveillance", question:"Lors de l'inspection interne d'un filtre à manches, que signifie une accumulation de matière fine au sol sous les manches ?", options:["Une ou plusieurs manches sont percées ou mal fixées","Le cycle de décolmatage fonctionne trop bien","Le ventilateur de tirage tourne à l'envers"], correct:0, temps:20 },
            { domaine:"Fiabilité & Méthodes", question:"Quelle méthode utilise-t-on pour remonter de manière logique jusqu'à la cause racine d'une rupture d'arbre ?", options:["L'arbre des causes (5 Pourquoi) / Ishikawa","Le tri Pareto direct","La méthode 5S d'atelier"], correct:0, temps:20 },
            { domaine:"Fiabilité & Méthodes", question:"Si le MTBF d'un concasseur augmente alors que le MTTR diminue, cela signifie que :", options:["La fiabilité s'améliore et les équipes réparent plus vite","La machine tombe plus souvent en panne","Le coût global explose"], correct:0, temps:25 },
            { domaine:"Fiabilité & Méthodes", question:"Dans une démarche AMDEC, l'Indice de Priorité de Risque (IPR) est le produit de :", options:["Gravité x Fréquence d'occurrence x Non-détection","Coût x Temps x Nombre d'intervenants","Durée de vie x Disponibilité x Rendement"], correct:0, temps:20 },
            { domaine:"Fiabilité & Méthodes", question:"La criticité d'un équipement en cimenterie est définie principalement par :", options:["L'impact de sa panne sur la sécurité, l'environnement et la production","Son année de fabrication et sa marque","Son poids et sa consommation électrique"], correct:0, temps:20 },
            { domaine:"Fiabilité & Méthodes", question:"Quel outil de planification permet de visualiser l'enchaînement et les dépendances des tâches d'un arrêt de four ?", options:["Le diagramme de Gantt (Chemin critique)","La matrice SWOT","Le diagramme de Pareto"], correct:0, temps:20 },
            { domaine:"HSE & Risques d'usine", question:"Quelle est la première étape obligatoire avant d'intervenir à l'intérieur d'un séparateur dynamique ?", options:["Consignation électrique et mécanique complète (LOTO)","Mettre ses gants en cuir","Démarrer le ventilateur de refroidissement"], correct:0, temps:15 },
            { domaine:"HSE & Risques d'usine", question:"Avant d'entrer dans un silo de clinker pour inspection, quelle mesure est vitale ?", options:["Analyse d'atmosphère (O2/gaz toxiques) et présence d'un surveillant extérieur","Allumer sa lampe torche uniquement","Porter un masque anti-poussière simple"], correct:0, temps:20 },
            { domaine:"HSE & Risques d'usine", question:"Quelle est la distance minimale de sécurité à respecter lors d'une opération de levage lourd (ex: virole de four) ?", options:["Hors de la zone de projection et d'évolution de la charge (zone d'exclusion)","2 mètres autour de la grue","La longueur du câble d'alimentation"], correct:0, temps:15 },
            { domaine:"HSE & Risques d'usine", question:"Dans une installation ATEX (Broyeur à charbon), quelle est la cause principale d'explosion ?", options:["Une accumulation de poussière fine de charbon combinée à une source de chaleur","Une fuite d'huile hydraulique propre","Une hausse de l'humidité relative de l'air"], correct:0, temps:20 },
            { domaine:"HSE & Risques d'usine", question:"Que doit faire un inspecteur s'il détecte une protection de sécurité (carter) manquante sur un accouplement de pompe ?", options:["Arrêter la machine si possible ou baliser la zone, et émettre un rapport de risque immédiat","Attendre l'arrêt programmé le mois suivant","Replacer un carton temporaire"], correct:0, temps:20 }
        ];

        let userNameFormatted = ""; let currentExam = []; let indexQ = 0; let answersUser = []; let timerQ; let secQ = 0; let secG = 0; let timerG;

        document.getElementById('themeToggle').addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const nom = document.getElementById('lastName').value.trim().toUpperCase();
            const prenom = document.getElementById('firstName').value.trim();
            userNameFormatted = prenom + " " + nom;
            document.getElementById('userProfile').innerText = "👤 " + userNameFormatted;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
        });

        document.getElementById('btnStartExam').addEventListener('click', () => {
            const dom = document.getElementById('cfgDomaine').value;
            const limit = parseInt(document.getElementById('cfgNb').value);
            
            let pool = dom === "Tous" ? [...questionBank] : questionBank.filter(q => q.domaine === dom);
            pool.sort(() => Math.random() - 0.5);
            currentExam = pool.slice(0, limit);

            indexQ = 0; answersUser = []; secG = 0;
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('examScreen').classList.remove('hidden');
            timerG = setInterval(() => { secG++; }, 1000);
            showQuestion();
        });

        function showQuestion() {
            if (indexQ >= currentExam.length) { syncAndSubmit(); return; }
            clearInterval(timerQ);
            
            const q = currentExam[indexQ];
            document.getElementById('lblDomaine').innerText = q.domaine;
            document.getElementById('questionText').innerText = q.question;
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = "";
            
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => {
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    btn.dataset.choice = idx;
                };
                container.appendChild(btn);
            });

            secQ = q.temps;
            document.getElementById('questionTimer').innerText = `${secQ}s`;
            timerQ = setInterval(() => {
                secQ--;
                document.getElementById('questionTimer').innerText = `${secQ}s`;
                if(secQ <= 0) validateAnswer();
            }, 1000);
            
            document.getElementById('progressFill').style.width = `${(indexQ / currentExam.length) * 100}%`;
        }

        document.getElementById('btnNext').addEventListener('click', validateAnswer);
        function validateAnswer() {
            const sel = document.querySelector('.option-btn.selected');
            answersUser.push(sel ? parseInt(sel.dataset.choice) : -1);
            indexQ++;
            showQuestion();
        }

        // REDIRECTION NATIVE SANS UTILISATION DE FETCH (BYPASSE TOUTES LES ERREURS CORS)
        function syncAndSubmit() {
            clearInterval(timerQ); clearInterval(timerG);
            
            let correct = 0;
            currentExam.forEach((q, i) => { if(answersUser[i] === q.correct) correct++; });
            const score = Math.round((correct / currentExam.length) * 100);
            const statut = score >= 75 ? "CONFORME" : "À REFORMER";
            const tempsTotalStr = `${Math.floor(secG/60)}m ${secG%60}s`;

            // Injection des données dans les inputs du formulaire masqué
            document.getElementById('postUser').value = userNameFormatted;
            document.getElementById('postDomaine').value = document.getElementById('cfgDomaine').value;
            document.getElementById('postNb').value = currentExam.length;
            document.getElementById('postScore').value = score;
            document.getElementById('postStatut').value = statut;
            document.getElementById('postTemps').value = tempsTotalStr;

            // Soumission native : Le navigateur redirige l'audité directement vers le script Google pour confirmation
            document.getElementById('googleSyncForm').submit();
        }
    </script>
</body>
</html>
